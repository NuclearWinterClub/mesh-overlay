<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=720">
  <title>SEARCHING — Nuclear Winter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      width: 1280px;
      height: 720px;
      margin: 0;
      padding: 0;
    }

    .terminal {
      position: absolute;
      bottom: 40px;
      left: 40px;
      width: 520px;
      padding: 0;
    }

    .line {
      font-size: 15px;
      letter-spacing: 2px;
      margin-bottom: 8px;
      min-height: 20px;
      display: flex;
      align-items: center;
      opacity: 0.85;
    }

    .line-init    { color: #00ff00; }
    .line-scan    { color: #00ff00; }
    .line-detect  { color: #ffb000; }
    .line-decrypt { color: #ffb000; }
    .line-auth    { color: #ffb000; }
    .line-confirm { color: #00ffff; text-shadow: 0 0 15px #00ffff; }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: currentColor;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 0.6s step-end infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .prefix {
      opacity: 0.5;
      margin-right: 12px;
    }

    .scanlines {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.12),
        rgba(0,0,0,0.12) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* No vignette — transparent background */
  </style>
</head>
<body>
  <div style="position:absolute;bottom:30px;left:30px;width:540px;
    background:rgba(0,0,0,0.45);padding:16px 20px;border-left:2px solid rgba(0,255,0,0.3);">
    <div class="terminal" id="terminal"></div>
  </div>
  <div class="scanlines"></div>

  <script>
    // ── SEQUENCE DEFINITION ──
    // charDelay: ms between each character — 18ms = fast machine typing
    // pauseAfter: ms cursor blinks after line completes before next line starts
    const LINES = [
      { text: 'INITIALIZING MESH RELAY...',         cls: 'line-init',    charDelay: 18, pauseAfter: 300 },
      { text: 'SCANNING FREQUENCIES 1-999...',      cls: 'line-scan',    charDelay: 18, pauseAfter: 300 },
      { text: 'SIGNAL DETECTED — TRIANGULATING...',  cls: 'line-detect',  charDelay: 18, pauseAfter: 400 },
      { text: 'DECRYPTING HANDSHAKE PROTOCOL...',   cls: 'line-decrypt', charDelay: 18, pauseAfter: 400 },
      { text: 'AUTHENTICATING NODE IDENTITY...',    cls: 'line-auth',    charDelay: 18, pauseAfter: 400 },
      { text: 'OASIS CONFIRMED — SIGNAL LOCKED.',   cls: 'line-confirm', charDelay: 22, pauseAfter: 800 },
    ];

    // ── ENGINE ──
    const terminal = document.getElementById('terminal');
    let lineIndex = 0;
    let activeCursor = null;

    function removeCursor() {
      if (activeCursor) { activeCursor.remove(); activeCursor = null; }
    }

    function typeLine(lineData, onComplete) {
      const div = document.createElement('div');
      div.className = 'line ' + lineData.cls;

      const prefix = document.createElement('span');
      prefix.className = 'prefix';
      prefix.textContent = '>';
      div.appendChild(prefix);

      const textSpan = document.createElement('span');
      div.appendChild(textSpan);

      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      div.appendChild(cursor);
      activeCursor = cursor;

      terminal.appendChild(div);

      let i = 0;
      const chars = lineData.text.split('');

      function typeNext() {
        if (i < chars.length) {
          textSpan.textContent += chars[i];
          i++;
          setTimeout(typeNext, lineData.charDelay);
        } else {
          setTimeout(() => {
            removeCursor();
            onComplete();
          }, lineData.pauseAfter);
        }
      }

      typeNext();
    }

    function runSequence() {
      if (lineIndex < LINES.length) {
        typeLine(LINES[lineIndex], () => {
          lineIndex++;
          runSequence();
        });
      }
      // OBS Advanced Scene Switcher handles the cut after sequence completes
    }

    // Small initial delay for dramatic effect
    setTimeout(runSequence, 400);
  </script>
</body>
</html>
