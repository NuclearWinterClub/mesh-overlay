  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --mesh-blue: #4488FF;
    --neon:      #39FF14;
    --amber:     #FFAA00;
    --amber-d:   #CC7700;
    --red:       #FF2200;
    --red-d:     #8B0000;
    --magenta:   #FF00FF;
    --yellow:    #FFFF00;
    --white:     #FFFFFF;
    --green:     #54FB01;
    --green-d:   #3DAA00;
    --green-x:   #1A4A00;
    --dim:       #4A6B4A;
    --dim:     #4A6B4A;
    --bg:      rgba(0,0,0,0.97);
    --bg-solid:  #000800;
    --scan: rgba(84,251,1,0.03);
  }

  html, body {
    width: 1280px;
    height: 720px;
    background: transparent;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }

  /* ── TICKER CONTAINER ── */
  #ticker-wrap {
    position: absolute;
    top: 20px;
    left: 0;
    width: 1280px;
    height: 100px;
    background: var(--bg);
    border-bottom: 1px solid var(--green-d);
    display: flex;
    align-items: center;
    overflow: hidden;
  }


  #ticker-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scan) 2px,
      var(--scan) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* ── LABEL BADGE ── */
  #label {
    flex-shrink: 0;
    width: 240px;
    height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    border-right: 1px solid var(--green-d);
    background: var(--bg-solid);
    position: relative;
    z-index: 5;
    transition: background 0.4s, border-color 0.4s;
  }

  #label-icon {
    font-family: 'TroySoldiers', 'Share Tech Mono', monospace;
    font-size: 30px;
    color: var(--green);
    letter-spacing: 2px;
    text-shadow: 0 0 8px var(--green);
    line-height: 1;
    transition: font-size 0.3s;
  }

  #label-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--green-d);
    letter-spacing: 3px;
  }

  #label-type {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--green);
    transition: color 0.4s;
  }

  #signal-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--green); }
    50%       { opacity: 0.4; box-shadow: 0 0 2px var(--green); }
  }



  /* ── PRIORITY INDICATOR ── */
  #priority-bar {
    flex-shrink: 0;
    width: 4px;
    height: 100px;
    transition: background 0.4s;
  }

  /* ── TICKER AREA ── */
  #msg-area {
    flex: 1;
    height: 100px;
    overflow: hidden;
    position: relative;
  }

  #msg-inner {
    display: flex;
    align-items: center;
    height: 100px;
    white-space: nowrap;
  }

  #msg-body {
    font-family: 'Share Tech Mono', monospace;
    font-size: 17px;
    color: var(--msg-color, var(--green));
    letter-spacing: 1px;
    white-space: nowrap;
    padding-left: 20px;
    display: inline-block;
    flex-shrink: 0;
  }

  @keyframes ticker-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(var(--ticker-distance, -100%)); }
  }

  #msg-body.scrolling {
    animation: ticker-scroll var(--ticker-duration, 10s) linear 1 forwards;
  }

  @keyframes text-blink-in {
    0%   { opacity: 0; }
    20%  { opacity: 1; }
    40%  { opacity: 0; }
    60%  { opacity: 1; }
    80%  { opacity: 0; }

  /* timestamp removed */

  .cat-operator  { --cat-color: var(--magenta);   --cat-bg: rgba(255,0,255,0.18); }

  /* ── GLITCH ANIMATION ── */
  @keyframes glitch {
    0%   { transform: translateX(0); }

  /* ── ENTRY/EXIT ANIMATIONS ── */

<body>

<div id="ticker-wrap" class="entering">

<script>
// ═══════════════════════════════════════════
// NUCLEAR WINTER — MESH OVERLAY ENGINE
// Live data: Google Sheets MESH tab
// Fallback: hardcoded FRAGMENTS array below
// ═══════════════════════════════════════════

// ── GOOGLE SHEETS CONFIG ─────────────────
const SHEETS_CSV_URL = 'https://docs.google.com/spreadsheets/d/1h7LrRXUAkHiWOSA7vJGg1bIvKoKK2SBZzmk3SkLdTPQ/gviz/tq?tqx=out:csv&sheet=MESH';
const SHEETS_POLL_INTERVAL = 60000; // refresh every 60 seconds

// Parse CSV text into rows, handling quoted fields with commas
function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let inQuote = false;
    let cell = '';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { cell += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        cols.push(cell.trim()); cell = '';
      } else {
        cell += ch;
      }
    }
    cols.push(cell.trim());
    rows.push(cols);
  }
  return rows;
}

// Type → category + badge label mapping
// Column F (index 5) in the MESH sheet
// Blank or unrecognized type defaults to mesh (green)
const TYPE_MAP = {
  'mesh':      { cat: 'mesh',      label: 'MESH FRAGMENT' },
  'covenant':  { cat: 'covenant',  label: 'COVENANT — INTERCEPT' },
  'oasis':     { cat: 'oasis',     label: 'OASIS // TRANSMISSION' },
  'community': { cat: 'community', label: 'COMMUNITY' },
  'resource':  { cat: 'resource',  label: 'RESOURCE' },
  'critical':  { cat: 'critical',  label: 'ALERT' },
  'operator':  { cat: 'operator',  label: 'OPERATOR' },
};

// Convert MESH sheet rows into fragment objects
// Columns: ID(0) | Content(1) | Cycle(2) | Date(3) | Status(4) | Type(5) | Title(6)
function sheetsRowsToFragments(rows) {
  const frags = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length < 5) continue;
    const status = (row[4] || '').toLowerCase().trim();
    if (status !== 'live') continue;
    const content = (row[1] || '').trim();
    if (!content) continue;
    const typeKey = (row[5] || '').toLowerCase().trim();
    const typeConfig = TYPE_MAP[typeKey] || TYPE_MAP['mesh'];
    const title = (row[6] || '').trim() || null;
    frags.push({
      cat: typeConfig.cat,
      label: typeConfig.label,
      header: title,
      body: content,
      priority: 'low'
    });
  }
  return frags;
}

// Fetch live fragments from Google Sheets
// On success: replaces fallback pool with live data — fallback never returns
// On failure: silently continues with current fragments, retries next interval
let sheetsLive = false; // true once live data has been confirmed at least once

function fetchSheetsFragments() {
  fetch(SHEETS_CSV_URL)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(text => {
      const rows = parseCSV(text);
      const live = sheetsRowsToFragments(rows);
      if (live.length > 0) {
        // Replace fragment pool with live Sheet data
        // Once live data is confirmed, fallback fragments are gone for this session
        FRAGMENTS.length = 0;
        live.forEach(f => FRAGMENTS.push(f));
        queue = shuffle([...FRAGMENTS]);
        qi = 0;
        if (!sheetsLive) {
          sheetsLive = true;
          console.log('[MESH] Live data confirmed — fallback retired for this session');
        }
        console.log('[MESH] Sheets loaded — ' + live.length + ' fragment(s) active');
      } else if (!sheetsLive) {
        // No live rows yet and we've never had live data — stay on fallback
        console.warn('[MESH] Sheets returned 0 live rows — holding on fallback fragments');
      } else {
        // Had live data before but sheet is now empty — keep last known live set
        console.warn('[MESH] Sheets returned 0 live rows — holding last known live fragments');
      }
    })
    .catch(err => {
      if (!sheetsLive) {
        console.warn('[MESH] Sheets fetch failed — running on fallback fragments:', err.message);
      } else {
        console.warn('[MESH] Sheets fetch failed — holding last known live fragments:', err.message);
      }
    });
}

// ── FALLBACK FRAGMENTS (used if Sheets unavailable) ──
// These display while waiting for Google Sheets connection.
// They disappear the moment live data is confirmed.
// Use these as tone/format templates when writing real MESH content.
const FRAGMENTS = [
  {
    cat: 'mesh',
    label: 'MESH FRAGMENT',
    header: 'SIGNAL LOST',
    body: 'Awaiting MESH relay connection. Live fragment data pending. Standing by for transmission.',
    priority: 'low'
  },
  {
    cat: 'covenant',
    label: 'COVENANT — INTERCEPT',
    header: 'SIGNAL LOST',
    body: 'Covenant monitoring status unavailable. Live intercept data pending connection. Maintain radio discipline.',
    priority: 'low'
  },
  {
    cat: 'oasis',
    label: 'OASIS // TRANSMISSION',
    header: 'SIGNAL LOST',
    body: 'Oasis transmission buffer empty. Live directives pending connection. The frequency will return.',
    priority: 'low'
  },
  {
    cat: 'community',
    label: 'COMMUNITY',
    header: 'SIGNAL LOST',
    body: 'Community feed offline. Survivor updates pending connection. You are not alone — signal acquiring.',
    priority: 'low'
  },
  {
    cat: 'resource',
    label: 'RESOURCE',
    header: 'SIGNAL LOST',
    body: 'Resource status unavailable. Supply data pending connection. Conserve until live feed restored.',
    priority: 'low'
  },
];

// ═══════════════════════════════════════════
// ENGINE — DO NOT EDIT BELOW THIS LINE
// ═══════════════════════════════════════════

const CATEGORY_CONFIG = {
  mesh:      { color: 'var(--mesh-blue)', bg: 'rgba(68,136,255,0.22)',  bar: 'var(--mesh-blue)', ts: 'MESH' },
  covenant:  { color: 'var(--red)',       bg: 'rgba(255,34,0,0.28)',    bar: 'var(--red)',       ts: 'ALERT' },
  resource:  { color: 'var(--yellow)',    bg: 'rgba(255,255,0,0.18)',   bar: 'var(--yellow)',    ts: 'RESOURCE' },
  community: { color: 'var(--white)',     bg: 'rgba(255,255,255,0.14)', bar: 'var(--white)',     ts: 'COMMUNITY' },
  oasis:     { color: 'var(--neon)',      bg: 'rgba(57,255,20,0.18)',   bar: 'var(--neon)',      ts: 'OASIS' },
  critical:  { color: 'var(--amber)',     bg: 'rgba(255,170,0,0.32)',   bar: 'var(--amber)',     ts: 'ALERT' },
  operator:  { color: 'var(--magenta)',   bg: 'rgba(255,0,255,0.18)',   bar: 'var(--magenta)',   ts: 'OPERATOR' },
};

const PRIORITY_COLORS = {
  low:  'transparent',
  med:  'var(--amber)',
  high: 'var(--red)',
};

// ── SETTLEMENT IDENTITY — reads from localStorage, set by V1 Operator Panel ──

// Display name translation table
// Canon name (stored value) → short display name for the left cell
// Add new settlements here as they come online
const SETTLEMENT_DISPLAY = {
  'OASIS':      'OASIS',
  'AMBER POST': 'AMBER',
  'SALTLINE':   'SALTLINE',
  'GRID 9F':    'GRID 9F',
  'FORGE':      'FORGE',
  'HAVEN':      'HAVEN',
  'CROSSING':   'CROSSING',
};

function getSettlement() {
  return (localStorage.getItem('nw_v1_settlement') || 'OASIS').toUpperCase();
}

function getSettlementDisplay(name) {
  return SETTLEMENT_DISPLAY[name] || name;
}

function updateSettlementDisplay() {
  const settlement    = getSettlement();
  const displayName   = getSettlementDisplay(settlement);
  const iconEl = document.getElementById('label-icon');
  if (iconEl) {
    iconEl.textContent = displayName;
    iconEl.style.fontSize = '30px'; // all display names fit at 30px
  }
  // Keep oasis category ts in sync with current settlement
  if (CATEGORY_CONFIG.oasis) {
    CATEGORY_CONFIG.oasis.ts = displayName;
  }
  // Keep TYPE_MAP oasis label in sync
  if (TYPE_MAP && TYPE_MAP['oasis']) {
    TYPE_MAP['oasis'].label = displayName + ' // TRANSMISSION';
  }
}

let currentIndex = 0;
let progressInterval = null;
let progressStart = null;

const wrap      = document.getElementById('ticker-wrap');
const labelEl    = document.getElementById('label');
const labelType  = document.getElementById('label-type');
const priorityBar = document.getElementById('priority-bar');
const msgBody   = document.getElementById('msg-body');

const alertFlash    = document.getElementById('alert-flash');
const criticalFlash = document.getElementById('critical-flash');
const progressEl = document.getElementById('progress-bar');

// Shuffle array for random rotation
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let queue = shuffle([...FRAGMENTS]);
let qi = 0;

function nextFragment() {
  if (qi >= queue.length) {
    queue = shuffle([...FRAGMENTS]);
    qi = 0;
  }
  return queue[qi++];
}

// clock removed

// Covenant flash
function triggerAlertFlash() {
  alertFlash.style.transition = 'opacity 0.1s';
  alertFlash.style.opacity = '0.15';
  setTimeout(() => {
    alertFlash.style.transition = 'opacity 0.4s';
    alertFlash.style.opacity = '0';
  }, 150);
  setTimeout(() => {
    alertFlash.style.transition = 'opacity 0.1s';
    alertFlash.style.opacity = '0.1';
  }, 400);
  setTimeout(() => {
    alertFlash.style.transition = 'opacity 0.6s';
    alertFlash.style.opacity = '0';
  }, 550);
}

// Critical flash (amber)
function triggerCriticalFlash() {
  criticalFlash.style.transition = 'opacity 0.1s';
  criticalFlash.style.opacity = '0.15';
  setTimeout(() => {
    criticalFlash.style.transition = 'opacity 0.4s';
    criticalFlash.style.opacity = '0';
  }, 150);
  setTimeout(() => {
    criticalFlash.style.transition = 'opacity 0.1s';
    criticalFlash.style.opacity = '0.1';
  }, 400);
  setTimeout(() => {
    criticalFlash.style.transition = 'opacity 0.6s';
    criticalFlash.style.opacity = '0';
  }, 550);
}

// Glitch
function triggerGlitch(el) {
  el.classList.remove('glitching');
  void el.offsetWidth;
  el.classList.add('glitching');
  setTimeout(() => el.classList.remove('glitching'), 500);
}

// Progress bar
function startProgress(duration) {
  if (progressInterval) clearInterval(progressInterval);
  progressEl.style.transition = 'none';
  progressEl.style.width = '0%';
  progressStart = Date.now();
  progressEl.style.transition = `width ${duration}ms linear`;
  requestAnimationFrame(() => {
    progressEl.style.width = '100%';
  });
}

// ── CONTENT-DRIVEN TIMING ──
// Duration is calculated from actual text length, not a fixed value.
// Short text: pauses, reads, fades. Long text: scrolls, pauses, fades.
// Scroll speed: 80px/sec. Hold after scroll: 2.5s. Minimum: 6s.

let currentDisplayTimer = null;

function scheduleExit(holdMs) {
  if (currentDisplayTimer) clearTimeout(currentDisplayTimer);
  currentDisplayTimer = setTimeout(() => {

    // Freeze text at end-of-scroll position before removing animation
    const computed = window.getComputedStyle(msgBody);
    const matrix   = computed.transform;
    if (matrix && matrix !== 'none') {
      msgBody.style.transform = matrix;
    }
    msgBody.classList.remove('scrolling');

    // Blink AND bar fade begin simultaneously — both take 3 seconds
    msgBody.classList.add('blinking');
    wrap.classList.add('fading');

    // After 3 seconds both are complete — clean up and wait 10s
    setTimeout(() => {
      msgBody.classList.remove('blinking');
      wrap.classList.remove('fading', 'entering', 'exiting');
      wrap.style.opacity = '0';
      msgBody.style.opacity = '1';
      msgBody.style.transform = ''; // reset for next fragment

      setTimeout(showNext, 10000);
    }, 3000);

  }, holdMs);
}

// Display fragment
function displayFragment(frag) {
  const cfg = CATEGORY_CONFIG[frag.cat] || CATEGORY_CONFIG.mesh;

  // Category badge + text color sync
  labelEl.style.background = cfg.bg;
  labelEl.style.borderColor = cfg.color;
  labelType.style.color = cfg.color;
  labelType.textContent = frag.label;

  msgBody.style.setProperty('--msg-color', cfg.color);

  // Priority bar
  priorityBar.style.background = PRIORITY_COLORS[frag.priority] || 'transparent';

  // Progress bar color
  progressEl.style.background = cfg.color;

  // Reset ticker state — start invisible for blink-in
  msgBody.classList.remove('scrolling', 'blink-in', 'blinking');
  void msgBody.offsetWidth;
  msgBody.style.setProperty('--ticker-distance', '0px');
  msgBody.style.setProperty('--ticker-duration', '0s');
  msgBody.style.opacity = '0';

  // Build ticker text: header · body combined
  const tickerText = frag.header
    ? frag.header + '   ·   ' + frag.body
    : frag.body;
  msgBody.textContent = tickerText;

  // Trigger blink-in after bar finishes sliding up (550ms)
  setTimeout(() => {
    msgBody.classList.add('blink-in');
    setTimeout(() => {
      msgBody.classList.remove('blink-in');
      msgBody.style.opacity = '1';
    }, 1500);
  }, 550);

  // Category-specific effects
  if (frag.cat === 'covenant') {
    triggerAlertFlash();
    wrap.style.animation = 'cov-pulse 2s ease-in-out 3';
    setTimeout(() => wrap.style.animation = '', 6100);
  } else if (frag.cat === 'critical') {
    triggerCriticalFlash();
    wrap.style.animation = 'crit-pulse 2s ease-in-out 3';
    setTimeout(() => wrap.style.animation = '', 6100);
  } else {
    wrap.style.animation = '';
  }

  // Calculate content-driven duration after text renders
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const areaWidth  = document.getElementById('msg-area').offsetWidth;
      const textWidth  = msgBody.scrollWidth;
      const overflow   = textWidth - areaWidth + 40;
      const HOLD_AFTER = 6000;  // ms to hold after scroll ends before exit begins
      const MIN_DISPLAY = 6000; // minimum ms on screen for very short text

      let totalDisplayMs;

      if (overflow > 0) {
        // Text needs to scroll — exit is scheduled AFTER scroll completes
        const scrollMs  = Math.round((overflow / 80) * 1000);
        const blinkDelay = 2050; // wait for slide-up (550ms) + blink-in (1500ms)
        const pauseMs    = blinkDelay + 1500; // then 1.5s read pause before scroll

        msgBody.style.setProperty('--ticker-distance', `-${overflow}px`);
        msgBody.style.setProperty('--ticker-duration', `${scrollMs}ms`);

        // Total visible time = pause + scroll + hold after
        totalDisplayMs = pauseMs + scrollMs + HOLD_AFTER;
        startProgress(totalDisplayMs);

        // Start scroll after blink-in + read pause
        setTimeout(() => {
          msgBody.classList.add('scrolling');
          scheduleExit(scrollMs + HOLD_AFTER);
        }, pauseMs);

      } else {
        // Short text — no scroll needed
        // Read time based on character count, minimum 6 seconds
        const chars      = tickerText.length;
        const blinkDelay = 2050;
        const readMs     = Math.max(MIN_DISPLAY, Math.round((chars / 12) * 1000) + HOLD_AFTER);
        totalDisplayMs   = blinkDelay + readMs;
        startProgress(totalDisplayMs);

        // Schedule exit after blink-in + read time
        scheduleExit(blinkDelay + readMs);
      }
    });
  });
}

// Rotate fragments
function showNext() {
  const frag = nextFragment();

  // Full reset before new content
  if (currentDisplayTimer) { clearTimeout(currentDisplayTimer); currentDisplayTimer = null; }
  wrap.classList.remove('exiting', 'fading', 'entering');
  wrap.style.opacity = '';      // clear inline opacity so CSS animation takes over
  wrap.style.transform = '';    // clear any lingering transform
  msgBody.classList.remove('blinking', 'scrolling');
  msgBody.style.opacity = '1';
  void wrap.offsetWidth;        // force reflow so animation fires fresh
  wrap.classList.add('entering');
  setTimeout(() => wrap.classList.remove('entering'), 550);

  displayFragment(frag);

  // Exit timing is now handled by displayFragment's scheduleExit()
  // based on actual text length — no fixed duration needed here
}

// ── SHEETS LIVE FETCH ────────────────────
// Fetch on load, then poll every 60 seconds
fetchSheetsFragments();
setInterval(fetchSheetsFragments, SHEETS_POLL_INTERVAL);

// Boot sequence
setTimeout(() => {
  showNext();
}, 1200);

// Keyboard shortcut: press N to skip to next fragment
document.addEventListener('keydown', (e) => {
  if (e.key === 'n' || e.key === 'N') showNext();
});

// ═══════════════════════════════════════════════════════════
// LIVE MESH SERVER CONNECTION
// Connects to local WebSocket server for live fragment injection
// from Discord and Twitch chat commands
// ═══════════════════════════════════════════════════════════

const MESH_SERVER = 'ws://localhost:3001';
let meshSocket = null;
let reconnectTimer = null;
let liveFragmentQueued = false;

function connectMesh() {
  try {
    meshSocket = new WebSocket(MESH_SERVER);

    meshSocket.onopen = () => {
      console.log('[MESH] Connected to server');
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
    };

    meshSocket.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);

        if (data.type === 'fragment') {
          // Update settlement display in case operator changed it
          updateSettlementDisplay();
          // Inject live fragment — interrupts rotation immediately
          injectLiveFragment(data);
        }
      } catch (e) {
        console.error('[MESH] Parse error:', e);
      }
    };

    meshSocket.onclose = () => {
      console.log('[MESH] Disconnected — retrying in 5s');
      meshSocket = null;
      reconnectTimer = setTimeout(connectMesh, 5000);
    };

    meshSocket.onerror = () => {
      // Silently fail — server may not be running
      meshSocket = null;
    };

  } catch (e) {
    // WebSocket not available or server not running — run in standalone mode
    console.log('[MESH] Running in standalone mode (no server connection)');
  }
}

// Inject a live fragment from Discord/Twitch — interrupts current rotation
let liveTimer = null;

function injectLiveFragment(frag) {
  // Clear any pending rotation timer
  if (liveTimer) clearTimeout(liveTimer);

  // Full reset before injected content
  if (currentDisplayTimer) { clearTimeout(currentDisplayTimer); currentDisplayTimer = null; }
  wrap.classList.remove('exiting', 'fading', 'entering');
  wrap.style.opacity = '';
  wrap.style.transform = '';
  msgBody.classList.remove('blinking', 'scrolling');
  msgBody.style.opacity = '1';
  void wrap.offsetWidth;
  wrap.classList.add('entering');
  setTimeout(() => wrap.classList.remove('entering'), 550);

  // Set a priority override duration if not specified
  frag.duration = frag.duration || 15000;

  displayFragment(frag);

  // Exit timing handled by displayFragment's scheduleExit()
}

// Start connection attempt
connectMesh();

// Set settlement identity on load and poll every 3s
updateSettlementDisplay();
setInterval(updateSettlementDisplay, 3000);

</script>
