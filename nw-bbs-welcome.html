<!DOCTYPE html>
<html lang="en">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      font-family: 'VT323', monospace;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    
    .container {
      width: 100vw;
      height: 100vh;
      background: #000;
      position: relative;
      overflow: hidden;
      color: #00ff00;
    }
    
    /* Terminal effect */
    .terminal {
      width: 100%;
      height: 100%;
      padding: 40px;
      font-size: 24px;
      line-height: 1.4;
      letter-spacing: 2px;
      position: relative;
      background: #000;
    }
    
    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 12px;
      height: 28px;
      background: #00ff00;
      margin-left: 5px;
      animation: blink-cursor 1s step-end infinite;
    }
    
    @keyframes blink-cursor {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    
    /* Text animations */
    .line {
      opacity: 0;
      animation: type-in 0.1s forwards;
    }
    
    @keyframes type-in {
      to { opacity: 1; }
    }
    
    /* ANSI color classes */
    .cyan { color: #00ffff; }
    .yellow { color: #ffff00; }
    .red { color: #ff0000; }
    .magenta { color: #ff00ff; }
    .blue { color: #5555ff; }
    .green { color: #00ff00; }
    .white { color: #ffffff; }
    .gray { color: #808080; }
    
    /* ANSI art border */
    .border-char { color: #00ffff; }
    
    /* Scanlines */
    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 1000;
    }
    
    /* CRT glow */
    .crt-glow {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center,
        rgba(0, 255, 0, 0.1) 0%,
        transparent 70%);
      pointer-events: none;
      z-index: 999;
    }
    
    /* Screen flicker */
    @keyframes flicker {
      0% { opacity: 1; }
      2% { opacity: 0.95; }
      4% { opacity: 1; }
      6% { opacity: 0.98; }
      8% { opacity: 1; }
      98% { opacity: 1; }
      100% { opacity: 0.97; }
    }
    
    .terminal {
      animation: flicker 0.15s infinite;
    }
    
    /* Text glow effect */
    .glow {
      text-shadow: 
        0 0 5px currentColor,
        0 0 10px currentColor;
    }
    
    /* Center content */
    .content {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    /* ASCII art spacing */
    pre {
      margin: 0;
      font-family: 'VT323', monospace;
      font-size: 24px;
      line-height: 1.2;
    }
    
    /* Controls */
    .controls {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 2000;
    }
    
    .replay-btn {
      background: #00ff00;
      color: #000;
      border: none;
      padding: 10px 20px;
      font-family: 'VT323', monospace;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 0 10px #00ff00;
      transition: all 0.3s;
      font-weight: bold;
    }
    
    .replay-btn:hover {
      background: #00ffff;
      box-shadow: 0 0 20px #00ffff;
    }
  </style>
</head>
